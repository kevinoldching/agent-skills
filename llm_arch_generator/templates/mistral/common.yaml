model_type: mistral
family: mistral

block:
  - type: attention
    components:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
  - type: ffn
    components:
      - gate_proj
      - up_proj
      - down_proj

stack:
  num_layers_key: num_hidden_layers
  pattern: "[block] × N"

residual: pre-norm
norm: rmsnorm
activation: silu
input: embed_tokens
output: lm_head

# Mistral uses GQA with sliding window attention
kv_heads_key: num_key_value_heads

# Sliding window attention
attention_impl: sliding_window
sliding_window_key: sliding_window
attention_type: swa