model_name: GPT-OSS-20B
# Hybrid Alternating: SWA layers + Full attention layers alternate
attention_hybrid_types:
  - swa
  - full
attention_hybrid_mode: alternating
layer_types_key: layer_types
hybrid_ratio: "1:1"  # 1 SWA layer : 1 Full layer alternating
attention_type: null  # Override common.yaml: hybrid_types take precedence over top-level attention_type
template: gpt-oss/common.yaml

config:
  hidden_size: 2880
  num_hidden_layers: 24
  num_attention_heads: 64
  num_key_value_heads: 8
  vocab_size: 201088
  intermediate_size: 2880
  # MoE
  num_local_experts: 32
  experts_per_token: 4
  router_aux_loss_coef: 0.9
  # Attention
  head_dim: 64
  sliding_window: 128
  # RoPE
  rope_theta: 150000
  rope_scaling:
    rope_type: yarn
    factor: 32.0
  # Other
  hidden_act: silu
  rms_norm_eps: 1e-05
