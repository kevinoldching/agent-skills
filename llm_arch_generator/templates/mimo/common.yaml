model_type: mimo
family: mimo

block:
  - type: attention
    components:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
  - type: moe_ffn
    components:
      - gate_proj
      - experts
      - shared_expert

stack:
  num_layers_key: num_hidden_layers
  pattern: "[block] × N"

residual: pre-norm
norm: rmsnorm
activation: silu
input: embed_tokens
output: lm_head

# Xiaomi MiMo uses GQA
kv_heads_key: num_key_value_heads

# MoE with sigmoid routing (MiMo uses sigmoid, not softmax)
moe:
  n_routed_experts_key: n_routed_experts
  num_experts_per_tok_key: num_experts_per_tok
  moe_intermediate_size_key: moe_intermediate_size
  scoring_func_key: scoring_func
  n_shared_experts_key: n_shared_experts
  n_shared_experts_default: 1

# Sliding window attention (MiMo-V2-Flash uses sliding_window=128)
attention_impl: sliding_window
sliding_window_key: sliding_window
attention_type: swa
