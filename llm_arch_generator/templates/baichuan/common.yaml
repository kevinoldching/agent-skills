model_type: baichuan
family: baichuan

block:
  - type: attention
    components:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
  - type: ffn
    components:
      - gate_proj
      - up_proj
      - down_proj

stack:
  num_layers_key: num_hidden_layers
  pattern: "[block] × N"

residual: pre-norm
norm: rmsnorm
activation: silu
input: embed_tokens
output: lm_head

# Attention type defaults for Baichuan family:
# - Baichuan-13B: standard (MHA)
# - Baichuan2-7B: standard (MHA)
# - Baichuan-M3: gqa
# Each model file must declare its own attention_type explicitly.