model_type: kimi
family: kimi

block:
  - type: attention
    components:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
  - type: ffn
    components:
      - gate_proj
      - up_proj
      - down_proj

stack:
  num_layers_key: num_hidden_layers
  pattern: "[block] × N"

residual: pre-norm
norm: rmsnorm
activation: silu
input: embed_tokens
output: lm_head

# Kimi K1.x: standard attention; K2.x: MLA attention
kv_heads_key: num_key_value_heads

# MLA attention keys (used by K2.x)
mla:
  kv_lora_rank_key: kv_lora_rank
  q_lora_rank_key: q_lora_rank
  qk_rope_head_dim_key: qk_rope_head_dim
  qk_nope_head_dim_key: qk_nope_head_dim
  v_head_dim_key: v_head_dim

# MoE (used by K2.x)
moe:
  n_routed_experts_key: num_experts
  num_experts_per_tok_key: num_experts_per_tok
  moe_intermediate_size_key: moe_intermediate_size
  n_shared_experts_key: n_shared_experts
  n_shared_experts_default: 1

# K2.x uses MLA attention
attention_type: mla