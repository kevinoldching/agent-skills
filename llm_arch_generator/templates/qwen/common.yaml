model_type: qwen
family: qwen

block:
  - type: attention
    components:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
  - type: ffn
    components:
      - gate_proj
      - up_proj
      - down_proj

stack:
  num_layers_key: num_hidden_layers
  pattern: "[block] × N"

residual: pre-norm
norm: rmsnorm
activation: silu
input: embed_tokens
output: lm_head

# Attention: Qwen2/3 use GQA (different kv_heads per model)
kv_heads_key: num_key_value_heads

# Family-wide attention type (can be overridden per model)
attention_impl: gqa
attention_type: gqa

# MoE: Qwen3.5 MoE series uses this structure
moe:
  n_routed_experts_key: num_experts
  num_experts_per_tok_key: num_experts_per_tok
  moe_intermediate_size_key: moe_intermediate_size
  n_shared_experts_key: n_shared_experts
  n_shared_experts_default: 1