model_type: llama
family: llama

block:
  - type: attention
    components:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
  - type: ffn
    components:
      - gate_proj
      - up_proj
      - down_proj

stack:
  num_layers_key: num_hidden_layers
  pattern: "[block] × N"

residual: pre-norm
norm: rmsnorm
activation: silu
input: embed_tokens
output: lm_head

# LLaMA2: MHA (kv_heads=num_heads); LLaMA3+: GQA
kv_heads_key: num_key_value_heads