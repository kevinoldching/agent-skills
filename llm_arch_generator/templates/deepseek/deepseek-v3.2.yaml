# DeepSeek-V3.2 — same architecture as V3
# Source: deepseek-ai/DeepSeek-V3.2
model_type: deepseek_v3
family: deepseek
model_name: DeepSeek-V3.2
source: deepseek-ai/DeepSeek-V3.2

config:
  hidden_size: 7168
  num_hidden_layers: 61
  intermediate_size: 18432
  num_attention_heads: 128
  num_key_value_heads: 128
  vocab_size: 129280
  head_dim: 56
  rope_theta: 10000.0
  max_position_embeddings: 163840

  # MoE
  n_routed_experts: 256
  num_experts_per_tok: 8
  moe_intermediate_size: 2048
  first_k_dense_replace: 3
  n_shared_experts: 1
  n_group: 8
  topk_group: 4
  moe_layer_freq: 1

  # MLA
  kv_lora_rank: 512
  q_lora_rank: 1536
  qk_rope_head_dim: 64
  qk_nope_head_dim: 128
  v_head_dim: 128

  # DSA (MLA + Indexer for sparse KV selection)
  sparse_topk: 8
  block_size: 4

# DSA = MLA framework + indexer for top-K sparse KV selection
attention_type: dsa
dsa:
  sparse_topk_key: sparse_topk
  block_size_key: block_size
template: deepseek/common.yaml
