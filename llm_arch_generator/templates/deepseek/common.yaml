# DeepSeek family template
# Covers: DeepSeek-V2, V2.5, V3, V3.1, V3.2, R1
model_type: deepseek_v3
family: deepseek

block:
  - type: attention
    components:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
  - type: dense_ffn
    components:
      - gate_proj
      - up_proj
      - down_proj
  - type: moe_ffn
    components:
      - gate_proj
      - experts
      - shared_expert

stack:
  num_layers_key: num_hidden_layers
  # first_k_dense_replace layers are dense, rest are MoE
  # Pattern: [dense_block] × first_k_dense_replace, then [moe_block] × (num_layers - first_k_dense_replace)

residual: pre-norm
norm: rmsnorm
activation: silu

input: embed_tokens
output: lm_head

# MLA attention keys
mla:
  kv_lora_rank_key: kv_lora_rank
  q_lora_rank_key: q_lora_rank
  qk_rope_head_dim_key: qk_rope_head_dim
  qk_nope_head_dim_key: qk_nope_head_dim
  v_head_dim_key: v_head_dim

# MoE parameters
moe:
  n_routed_experts_key: n_routed_experts
  num_experts_per_tok_key: num_experts_per_tok
  moe_intermediate_size_key: moe_intermediate_size
  first_k_dense_replace_key: first_k_dense_replace
  n_shared_experts_key: n_shared_experts
  n_shared_experts_default: 1

kv_heads_key: num_key_value_heads

# Attention defaults for DeepSeek family
attention_type: mla
mla:
  kv_lora_rank_key: kv_lora_rank
  q_lora_rank_key: q_lora_rank
  qk_rope_head_dim_key: qk_rope_head_dim
  qk_nope_head_dim_key: qk_nope_head_dim
  v_head_dim_key: v_head_dim
