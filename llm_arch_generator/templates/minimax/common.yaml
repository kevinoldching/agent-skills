model_type: minimax
family: minimax

block:
  - type: attention
    components:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
  - type: moe_ffn
    components:
      - gate_proj
      - experts
      - shared_expert

stack:
  num_layers_key: num_hidden_layers
  pattern: "[block] × N"

residual: pre-norm
norm: rmsnorm
activation: silu
input: embed_tokens
output: lm_head

# MiniMax uses GQA
kv_heads_key: num_key_value_heads

# MoE (all MiniMax models use MoE)
moe:
  n_routed_experts_key: num_experts
  num_experts_per_tok_key: num_experts_per_tok
  moe_intermediate_size_key: moe_intermediate_size

attention_type: gqa