# 权重分类规则配置文件
# 用于将不同模型的权重名称映射到标准的 YAML 结构

# 通用规则（适用于大多数 Transformer 模型）
generic:
  embedding:
    patterns:
      - "^embed_tokens\\.weight$"
      - "^model\\.embed_tokens\\.weight$"
      - "^lm_head\\.weight$"
      - ".*wte.*"              # GPT style
      - ".*word_embeddings.*"  # BERT style

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.self_attn\\..*"

  ffn_router:
    patterns:
      - "^mlp\\.gate\\..*"
      - "^mlp\\.router\\..*"
      - ".*\\.mlp\\.gate\\..*"
      - ".*\\.mlp\\.router\\..*"

  ffn_expert:
    patterns:
      - "^mlp\\.experts\\.\\d+\\..*"
      - "^mlp\\.experts\\.(gate_up_proj|down_proj).*"
      - ".*\\.mlp\\.experts\\..*"
    exclude:
      - ".*\\.shared_experts\\..*"

  ffn_shared_expert:
    patterns:
      - "^mlp\\.shared_experts\\..*"
      - ".*\\.mlp\\.shared_experts\\..*"

  ffn_dense:
    patterns:
      - "^mlp\\.(gate_proj|up_proj|down_proj)\\..*"
      - ".*\\.mlp\\.(gate_proj|up_proj|down_proj)\\..*"
    exclude:
      - ".*\\.experts\\..*"
      - ".*\\.shared_experts\\..*"

  norm:
    patterns:
      - "^input_layernorm\\..*"
      - "^post_attention_layernorm\\..*"
      - ".*\\.input_layernorm\\..*"
      - ".*\\.post_attention_layernorm\\..*"
      - "^model\\.norm\\.weight$"
      - "^norm\\.weight$"

# DeepSeek 特定规则（MLA 架构 + MoE + MTP）
deepseek:
  embedding:
    patterns:
      - "^embed_tokens\\.weight$"
      - "^model\\.embed_tokens\\.weight$"
      - "^lm_head\\.weight$"
      - "^shared_head\\.head\\.weight$"

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.self_attn\\..*"

  ffn_router:
    patterns:
      - "^mlp\\.gate\\..*"
      - ".*\\.mlp\\.gate\\..*"

  ffn_expert:
    patterns:
      - "^mlp\\.experts\\.\\d+\\..*"
      - ".*\\.mlp\\.experts\\.\\d+\\..*"
    exclude:
      - ".*\\.shared_experts\\..*"

  ffn_shared_expert:
    patterns:
      - "^mlp\\.shared_experts\\..*"
      - ".*\\.mlp\\.shared_experts\\..*"

  ffn_dense:
    patterns:
      - "^mlp\\.(gate_proj|up_proj|down_proj)\\..*"
      - ".*\\.mlp\\.(gate_proj|up_proj|down_proj)\\..*"
    exclude:
      - ".*\\.experts\\..*"
      - ".*\\.shared_experts\\..*"

  norm:
    patterns:
      - "^input_layernorm\\..*"
      - "^post_attention_layernorm\\..*"
      - ".*\\.input_layernorm\\..*"
      - ".*\\.post_attention_layernorm\\..*"
      - "^model\\.norm\\.weight$"
      - "^enorm\\.weight$"
      - "^hnorm\\.weight$"
      - "^shared_head\\.norm\\.weight$"

  others:
    patterns:
      - "^eh_proj\\.weight$"

# GPT-OSS 特定规则（特殊 MoE 结构）
gpt_oss:
  inherit: generic

  ffn_router:
    patterns:
      - "^mlp\\.router\\..*"
      - ".*\\.mlp\\.router\\..*"

  ffn_expert:
    patterns:
      - "^mlp\\.experts\\.(gate_up_proj|down_proj).*"
      - ".*\\.mlp\\.experts\\.(gate_up_proj|down_proj).*"

# Llama 系列（使用通用规则）
llama:
  inherit: generic

# Qwen 系列
qwen:
  inherit: generic

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.c_attn\\..*"
      - ".*\\.c_proj\\..*"
