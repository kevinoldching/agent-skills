# жқғйҮҚеҲҶзұ»и§„еҲҷй…ҚзҪ®ж–Үд»¶
# з”ЁдәҺе°ҶдёҚеҗҢжЁЎеһӢзҡ„жқғйҮҚеҗҚз§°жҳ е°„еҲ°ж ҮеҮҶзҡ„ YAML з»“жһ„

# йҖҡз”Ёи§„еҲҷпјҲйҖӮз”ЁдәҺеӨ§еӨҡж•° Transformer жЁЎеһӢпјү
generic:
  embedding:
    patterns:
      - "^embed_tokens\\.weight$"
      - "^model\\.embed_tokens\\.weight$"
      - "^lm_head\\.weight$"
      - ".*wte.*"              # GPT style
      - ".*word_embeddings.*"  # BERT style

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.self_attn\\..*"

  ffn_moe:
    patterns:
      - "^mlp\\.gate\\..*"
      - "^mlp\\.router\\..*"
      - ".*\\.mlp\\.gate\\..*"
      - ".*\\.mlp\\.router\\..*"
      - "^mlp\\.experts\\.\\d+\\..*"
      - "^mlp\\.experts\\.(gate_up_proj|down_proj).*"
      - ".*\\.mlp\\.experts\\..*"
    exclude:
      - ".*\\.shared_experts\\..*"

  ffn_shared_expert:
    patterns:
      - "^mlp\\.shared_experts\\..*"
      - ".*\\.mlp\\.shared_experts\\..*"

  ffn_dense:
    patterns:
      - "^mlp\\.(gate_proj|up_proj|down_proj)\\..*"
      - ".*\\.mlp\\.(gate_proj|up_proj|down_proj)\\..*"
    exclude:
      - ".*\\.experts\\..*"
      - ".*\\.shared_experts\\..*"

  norm:
    patterns:
      - "^input_layernorm\\..*"
      - "^post_attention_layernorm\\..*"
      - ".*\\.input_layernorm\\..*"
      - ".*\\.post_attention_layernorm\\..*"
      - "^model\\.norm\\.weight$"
      - "^norm\\.weight$"

# DeepSeek зү№е®ҡи§„еҲҷпјҲMLA жһ¶жһ„ + MoE + MTPпјү
deepseek:
  embedding:
    patterns:
      - "^embed_tokens\\.weight$"
      - "^model\\.embed_tokens\\.weight$"
      - "^lm_head\\.weight$"
      - "^shared_head\\.head\\.weight$"

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.self_attn\\..*"

  ffn_moe:
    patterns:
      - "^mlp\\.gate\\..*"
      - ".*\\.mlp\\.gate\\..*"
      - "^mlp\\.experts\\.\\d+\\..*"
      - ".*\\.mlp\\.experts\\.\\d+\\..*"
    exclude:
      - ".*\\.shared_experts\\..*"

  ffn_shared_expert:
    patterns:
      - "^mlp\\.shared_experts\\..*"
      - ".*\\.mlp\\.shared_experts\\..*"

  ffn_dense:
    patterns:
      - "^mlp\\.(gate_proj|up_proj|down_proj)\\..*"
      - ".*\\.mlp\\.(gate_proj|up_proj|down_proj)\\..*"
    exclude:
      - ".*\\.experts\\..*"
      - ".*\\.shared_experts\\..*"

  norm:
    patterns:
      - "^input_layernorm\\..*"
      - "^post_attention_layernorm\\..*"
      - ".*\\.input_layernorm\\..*"
      - ".*\\.post_attention_layernorm\\..*"
      - "^model\\.norm\\.weight$"
      - "^enorm\\.weight$"
      - "^hnorm\\.weight$"
      - "^shared_head\\.norm\\.weight$"

  others:
    patterns:
      - "^eh_proj\\.weight$"

# GPT-OSS зү№е®ҡи§„еҲҷпјҲзү№ж®Ҡ MoE з»“жһ„пјү
gpt_oss:
  inherit: generic

  ffn_moe:
    patterns:
      - "^mlp\\.router\\..*"
      - ".*\\.mlp\\.router\\..*"
      - "^mlp\\.experts\\.(gate_up_proj|down_proj).*"
      - ".*\\.mlp\\.experts\\.(gate_up_proj|down_proj).*"

# Llama зі»еҲ—пјҲдҪҝз”ЁйҖҡз”Ёи§„еҲҷпјү
llama:
  inherit: generic

# Qwen зі»еҲ—
qwen:
  inherit: generic

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.c_attn\\..*"
      - ".*\\.c_proj\\..*"

# MiniMax зі»еҲ—
minimax:
  inherit: generic

  # MiniMax дҪҝз”Ё block_sparse_moe дҪңдёә MoE жЁЎеқ—еҗҚ
  ffn_moe:
    patterns:
      - "^block_sparse_moe\\.experts\\.\\d+.*"
      - "^block_sparse_moe\\.gate.*"
      - ".*\\.block_sparse_moe\\.experts\\.\\d+.*"
      - ".*\\.block_sparse_moe\\.gate.*"
    exclude:
      - ".*shared_experts.*"

  ffn_shared_expert:
    patterns:
      - "^block_sparse_moe\\.shared_experts.*"
      - ".*\\.block_sparse_moe\\.shared_experts.*"

  # MiniMax attention patterns
  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.core_attn\\..*"

# ============================================================================
# Architecture Config еӯ—ж®өжҳ е°„
# е°ҶдёҚеҗҢжЁЎеһӢзҡ„ config.json еӯ—ж®өжҳ е°„еҲ°ж ҮеҮҶеӯ—ж®өеҗҚ
# ============================================================================
architecture_config:
  # ж ҮеҮҶеӯ—ж®өеҗҚ -> жЁЎеһӢconfigдёӯеҸҜиғҪдҪҝз”Ёзҡ„еӯ—ж®өеҗҚ
  field_mappings:
    hidden_size:
      - "hidden_size"
    head_dim:
      - "head_dim"
    num_layers:
      - "num_hidden_layers"
      - "n_layer"
      - "num_layers"
    vocab_size:
      - "vocab_size"
    num_attention_heads:
      - "num_attention_heads"
      - "n_heads"
    num_key_value_heads:
      - "num_key_value_heads"
      - "num_kv_heads"
      - "n_kv_heads"
    intermediate_size:
      - "intermediate_size"
      - "ffn_hidden_size"
    num_experts:
      - "num_experts"
      - "n_routed_experts"
      - "num_local_experts"
    num_experts_per_tok:
      - "num_experts_per_tok"
      - "top_k"
      - "moe_top_k"
    moe_intermediate_size:
      - "moe_intermediate_size"
      - "moe_ffn_hidden_size"
    q_lora_rank:
      - "q_lora_rank"
      - "q_rank"
    kv_lora_rank:
      - "kv_lora_rank"
      - "kv_rank"
    v_head_dim:
      - "v_head_dim"
      - "v_head_ratio"
    qk_rope_head_dim:
      - "qk_rope_head_dim"
      - "rope_head_dim"
    qk_nope_head_dim:
      - "qk_nope_head_dim"
