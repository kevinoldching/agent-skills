# 权重分类规则配置文件
# 用于将不同模型的权重名称映射到标准的 YAML 结构

# 通用规则（适用于大多数 Transformer 模型）
generic:
  embedding:
    patterns:
      - ".*\\.embed_tokens\\.weight$"
      - "^model\\.embed_tokens\\.weight$"
      - ".*\\.lm_head\\.weight$"
      - ".*wte.*"              # GPT style
      - ".*word_embeddings.*"  # BERT style

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.self_attn\\..*"

  ffn_moe:
    patterns:
      - "^mlp\\.gate\\..*"
      - "^mlp\\.router\\..*"
      - ".*\\.mlp\\.gate\\..*"
      - ".*\\.mlp\\.router\\..*"
      - "^mlp\\.experts\\.\\d+\\..*"
      - "^mlp\\.experts\\.(gate_up_proj|down_proj).*"
      - ".*\\.mlp\\.experts\\..*"
    exclude:
      - ".*\\.shared_experts\\..*"

  ffn_shared_expert:
    patterns:
      - "^mlp\\.shared_experts\\..*"
      - ".*\\.mlp\\.shared_experts\\..*"
      - ".*\\.shared_experts\\..*"

  ffn_dense:
    patterns:
      - "^mlp\\.(gate_proj|up_proj|down_proj)\\..*"
      - ".*\\.mlp\\.(gate_proj|up_proj|down_proj)\\..*"
    exclude:
      - ".*\\.experts\\..*"
      - ".*\\.shared_experts\\..*"

  norm:
    patterns:
      - "^input_layernorm\\..*"
      - "^post_attention_layernorm\\..*"
      - ".*\\.input_layernorm\\..*"
      - ".*\\.post_attention_layernorm\\..*"
      - "^model\\.norm\\.weight$"
      - "^norm\\.weight$"

  # TP 变体配置：定义可引用的 TP 变体及其默认值
  # 变体名称格式：TP_XXX，其中 XXX 表示该变体应用的权重组
  # 在 parallel_defaults 中引用这些变体名称，代码会根据变体名称应用对应的 TP size
  # CLI 参数可覆盖这些默认值（如 --tp-o-proj 4 覆盖 TP_O_PROJ 的默认值）
  tp_variants:
    TP_O_PROJ: 8      # o_proj.weight 的默认 TP size
    TP_MLP: 8         # FFN 权重的默认 TP size
    TP_SHARED_EXPERT: 8  # 共享专家的默认 TP size
    TP_EMBEDDING: 8   # embedding 的默认 TP size

  # 默认并行策略配置（PD分离-三层结构）
  # parallel_defaults: 混部/通用场景（stage=hybrid）
  # parallel_defaults.prefill: PD分离-prefill专用（stage=prefill）
  # parallel_defaults.decode: PD分离-decode专用（stage=decode）
  # 三层为平级key，不是嵌套关系
  # 继承规则：模型定义了某stage → 使用模型的；模型未定义 → 使用generic的同名stage
  # 注意：generic只定义parallel_defaults，prefill/decode由具体模型定义
  parallel_defaults:
    embedding: TP
    attention:
      q_proj.weight: TP
      k_proj.weight: TP
      v_proj.weight: TP
      o_proj.weight: TP
      q_b_proj.weight: TP
      kv_b_proj.weight: TP
    ffn_moe:
      experts: EP
    ffn_dense: TP
    ffn_shared_expert: TP
    norm: replicated
    others: replicated

  # 计算规则（按 attention_type 和 ffn_type 自动选择公式）
  computation_rules:
    recommended_capacity_factor:
      has_prefill: 1.25   # prefill（含混部）
      decode: 12.5        # 纯 decode

    # 系统预留显存（GB）
    system_reserved_gb: 2.0

    # GPU 利用率（0-1.0），可用显存 = 实际显存 * gpu_util
    gpu_util: 0.9

    # 按 attention_type 的 KV Cache 公式
    kv_cache:
      mha: "2 * batch_size * seq_len * num_attention_heads * head_dim * num_layers / (tp_size * cp_size)"
      mqa: "2 * batch_size * seq_len * head_dim * num_layers / (tp_size * cp_size)"
      gqa: "2 * batch_size * seq_len * num_key_value_heads * head_dim * num_layers / (tp_size * cp_size)"
      mla: "batch_size * seq_len * (kv_lora_rank + qk_rope_head_dim) * num_layers / cp_size"
      swa: "2 * batch_size * min(seq_len, window_size) * num_key_value_heads * head_dim * num_layers / (tp_size * cp_size)"

    # 按 ffn_type 的 Activation 公式
    activation:
      dense: "batch_size * seq_len * hidden_size * recommended_capacity_factor / cp_size"
      moe: "batch_size * seq_len * hidden_size * num_experts_per_tok * recommended_capacity_factor / cp_size"

# DeepSeek 特定规则（MLA 架构 + MoE + MTP）
deepseek:
  embedding:
    patterns:
      - "^embed_tokens\\.weight$"
      - "^model\\.embed_tokens\\.weight$"
      - "^lm_head\\.weight$"
      - "^shared_head\\.head\\.weight$"

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.self_attn\\..*"

  ffn_moe:
    patterns:
      - "^mlp\\.gate\\..*"
      - ".*\\.mlp\\.gate\\..*"
      - "^mlp\\.experts\\.\\d+\\..*"
      - ".*\\.mlp\\.experts\\.\\d+\\..*"
    exclude:
      - ".*\\.shared_experts\\..*"

  ffn_shared_expert:
    patterns:
      - "^mlp\\.shared_experts\\..*"
      - ".*\\.mlp\\.shared_experts\\..*"
      - ".*\\.shared_experts\\..*"

  ffn_dense:
    patterns:
      - "^mlp\\.(gate_proj|up_proj|down_proj)\\..*"
      - ".*\\.mlp\\.(gate_proj|up_proj|down_proj)\\..*"
    exclude:
      - ".*\\.experts\\..*"
      - ".*\\.shared_experts\\..*"

  norm:
    patterns:
      - "^input_layernorm\\..*"
      - "^post_attention_layernorm\\..*"
      - ".*\\.input_layernorm\\..*"
      - ".*\\.post_attention_layernorm\\..*"
      - "^model\\.norm\\.weight$"
      - "^enorm\\.weight$"
      - "^hnorm\\.weight$"
      - "^shared_head\\.norm\\.weight$"

  others:
    patterns:
      - "^eh_proj\\.weight$"

# GPT-OSS 模型类型（定义共享的 ffn_moe patterns）
gpt_oss:
  inherit: generic

  ffn_moe:
    patterns:
      - "^mlp\\.router\\..*"
      - ".*\\.mlp\\.router\\..*"
      - "^mlp\\.experts\\.(gate_up_proj|down_proj).*"
      - ".*\\.mlp\\.experts\\.(gate_up_proj|down_proj).*"

# GPT-OSS-120B 特定规则（继承 gpt_oss，带峰值限制）
gpt-oss-120b:
  inherit: gpt_oss

  # 覆盖 computation_rules
  computation_rules:
    kv_cache: "(18 * batch_size * seq_len * 1024 + 18 * min(batch_size * seq_len, 128) * 1024) / (tp_size * cp_size)"

# GPT-OSS-20B 特定规则（继承 gpt_oss，复用 computation_rules）
gpt-oss-20b:
  inherit: gpt_oss
  # 覆盖 computation_rules
  computation_rules:
    kv_cache: "(12 * batch_size * seq_len * 1024 + 12 * min(batch_size * seq_len, 128) * 1024) / (tp_size * cp_size)"

# Qwen 系列
qwen3_next:
  inherit: generic

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.c_attn\\..*"
      - ".*\\.c_proj\\..*"
      - ".*\\.linear_attn\\..*"

# MiniMax 系列
minimax_m2:
  inherit: generic

  # MiniMax 使用 block_sparse_moe 作为 MoE 模块名
  ffn_moe:
    patterns:
      - "^block_sparse_moe\\.experts\\.\\d+.*"
      - "^block_sparse_moe\\.gate.*"
      - ".*\\.block_sparse_moe\\.experts\\.\\d+.*"
      - ".*\\.block_sparse_moe\\.gate.*"

Kimi-K2.5:
  inherit: generic

  # 混部/通用场景的并行策略（继承generic，仅覆盖ffn_shared_expert）
  parallel_defaults:
    ffn_shared_expert: TP_SHARED_EXPERT

  # PD分离-decode专用
  parallel_defaults.decode:
    embedding: TP_EMBEDDING
    ffn_shared_expert: TP_O_PROJ
    attention:
      o_proj.weight: TP_O_PROJ

# ============================================================================
# Architecture Config 字段映射
# 将不同模型的 config.json 字段映射到标准字段名
# ============================================================================
architecture_config:
  # 标准字段名 -> 模型config中可能使用的字段名
  field_mappings:
    hidden_size:
      - "hidden_size"
    head_dim:
      - "head_dim"
    num_layers:
      - "num_hidden_layers"
      - "n_layer"
      - "num_layers"
    vocab_size:
      - "vocab_size"
    num_attention_heads:
      - "num_attention_heads"
      - "n_heads"
    num_key_value_heads:
      - "num_key_value_heads"
      - "num_kv_heads"
      - "n_kv_heads"
    intermediate_size:
      - "intermediate_size"
      - "ffn_hidden_size"
    num_experts:
      - "num_experts"
      - "n_routed_experts"
      - "num_local_experts"
    num_experts_per_tok:
      - "num_experts_per_tok"
      - "top_k"
      - "moe_top_k"
    moe_intermediate_size:
      - "moe_intermediate_size"
      - "moe_ffn_hidden_size"
    q_lora_rank:
      - "q_lora_rank"
      - "q_rank"
    kv_lora_rank:
      - "kv_lora_rank"
      - "kv_rank"
    v_head_dim:
      - "v_head_dim"
      - "v_head_ratio"
    qk_rope_head_dim:
      - "qk_rope_head_dim"
      - "rope_head_dim"
    qk_nope_head_dim:
      - "qk_nope_head_dim"
    window_size:
      - "sliding_window"
      - "window_size"
