# 权重分类规则配置文件
# 用于将不同模型的权重名称映射到标准的 YAML 结构

# 通用规则（适用于大多数 Transformer 模型）
generic:
  embedding:
    patterns:
      - "^embed_tokens\\.weight$"
      - "^model\\.embed_tokens\\.weight$"
      - "^lm_head\\.weight$"
      - ".*wte.*"              # GPT style
      - ".*word_embeddings.*"  # BERT style

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.self_attn\\..*"

  ffn_moe:
    patterns:
      - "^mlp\\.gate\\..*"
      - "^mlp\\.router\\..*"
      - ".*\\.mlp\\.gate\\..*"
      - ".*\\.mlp\\.router\\..*"
      - "^mlp\\.experts\\.\\d+\\..*"
      - "^mlp\\.experts\\.(gate_up_proj|down_proj).*"
      - ".*\\.mlp\\.experts\\..*"
    exclude:
      - ".*\\.shared_experts\\..*"

  ffn_shared_expert:
    patterns:
      - "^mlp\\.shared_experts\\..*"
      - ".*\\.mlp\\.shared_experts\\..*"

  ffn_dense:
    patterns:
      - "^mlp\\.(gate_proj|up_proj|down_proj)\\..*"
      - ".*\\.mlp\\.(gate_proj|up_proj|down_proj)\\..*"
    exclude:
      - ".*\\.experts\\..*"
      - ".*\\.shared_experts\\..*"

  norm:
    patterns:
      - "^input_layernorm\\..*"
      - "^post_attention_layernorm\\..*"
      - ".*\\.input_layernorm\\..*"
      - ".*\\.post_attention_layernorm\\..*"
      - "^model\\.norm\\.weight$"
      - "^norm\\.weight$"

  # 默认并行策略配置
  parallel_defaults:
    embedding: TP
    attention:
      q_proj.weight: TP
      k_proj.weight: TP
      v_proj.weight: TP
      o_proj.weight: TP
    ffn_moe:
      experts: EP
    ffn_dense: TP
    ffn_shared_expert: replicated
    norm: replicated
    others: replicated

# DeepSeek 特定规则（MLA 架构 + MoE + MTP）
deepseek:
  embedding:
    patterns:
      - "^embed_tokens\\.weight$"
      - "^model\\.embed_tokens\\.weight$"
      - "^lm_head\\.weight$"
      - "^shared_head\\.head\\.weight$"

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.self_attn\\..*"

  ffn_moe:
    patterns:
      - "^mlp\\.gate\\..*"
      - ".*\\.mlp\\.gate\\..*"
      - "^mlp\\.experts\\.\\d+\\..*"
      - ".*\\.mlp\\.experts\\.\\d+\\..*"
    exclude:
      - ".*\\.shared_experts\\..*"

  ffn_shared_expert:
    patterns:
      - "^mlp\\.shared_experts\\..*"
      - ".*\\.mlp\\.shared_experts\\..*"

  ffn_dense:
    patterns:
      - "^mlp\\.(gate_proj|up_proj|down_proj)\\..*"
      - ".*\\.mlp\\.(gate_proj|up_proj|down_proj)\\..*"
    exclude:
      - ".*\\.experts\\..*"
      - ".*\\.shared_experts\\..*"

  norm:
    patterns:
      - "^input_layernorm\\..*"
      - "^post_attention_layernorm\\..*"
      - ".*\\.input_layernorm\\..*"
      - ".*\\.post_attention_layernorm\\..*"
      - "^model\\.norm\\.weight$"
      - "^enorm\\.weight$"
      - "^hnorm\\.weight$"
      - "^shared_head\\.norm\\.weight$"

  others:
    patterns:
      - "^eh_proj\\.weight$"

# GPT-OSS 特定规则（特殊 MoE 结构）
gpt_oss:
  inherit: generic

  ffn_moe:
    patterns:
      - "^mlp\\.router\\..*"
      - ".*\\.mlp\\.router\\..*"
      - "^mlp\\.experts\\.(gate_up_proj|down_proj).*"
      - ".*\\.mlp\\.experts\\.(gate_up_proj|down_proj).*"

# Llama 系列（使用通用规则）
llama:
  inherit: generic

# Qwen 系列
qwen:
  inherit: generic

  attention:
    patterns:
      - "^self_attn\\..*"
      - ".*\\.c_attn\\..*"
      - ".*\\.c_proj\\..*"

# MiniMax 系列
minimax_m2:
  inherit: generic

  # MiniMax 使用 block_sparse_moe 作为 MoE 模块名
  ffn_moe:
    patterns:
      - "^block_sparse_moe\\.experts\\.\\d+.*"
      - "^block_sparse_moe\\.gate.*"
      - ".*\\.block_sparse_moe\\.experts\\.\\d+.*"
      - ".*\\.block_sparse_moe\\.gate.*"

# ============================================================================
# Architecture Config 字段映射
# 将不同模型的 config.json 字段映射到标准字段名
# ============================================================================
architecture_config:
  # 标准字段名 -> 模型config中可能使用的字段名
  field_mappings:
    hidden_size:
      - "hidden_size"
    head_dim:
      - "head_dim"
    num_layers:
      - "num_hidden_layers"
      - "n_layer"
      - "num_layers"
    vocab_size:
      - "vocab_size"
    num_attention_heads:
      - "num_attention_heads"
      - "n_heads"
    num_key_value_heads:
      - "num_key_value_heads"
      - "num_kv_heads"
      - "n_kv_heads"
    intermediate_size:
      - "intermediate_size"
      - "ffn_hidden_size"
    num_experts:
      - "num_experts"
      - "n_routed_experts"
      - "num_local_experts"
    num_experts_per_tok:
      - "num_experts_per_tok"
      - "top_k"
      - "moe_top_k"
    moe_intermediate_size:
      - "moe_intermediate_size"
      - "moe_ffn_hidden_size"
    q_lora_rank:
      - "q_lora_rank"
      - "q_rank"
    kv_lora_rank:
      - "kv_lora_rank"
      - "kv_rank"
    v_head_dim:
      - "v_head_dim"
      - "v_head_ratio"
    qk_rope_head_dim:
      - "qk_rope_head_dim"
      - "rope_head_dim"
    qk_nope_head_dim:
      - "qk_nope_head_dim"
