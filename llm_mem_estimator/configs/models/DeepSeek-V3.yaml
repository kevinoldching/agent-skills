model_identity:
  name: DeepSeek-V3
  total_params: '684.53B'
  num_layers: 61
  quantization: fp8
architecture_config:
  hidden_size: 7168
  num_layers: 61
  attention_type: mla
  ffn_type: moe
  norm_type: rmsnorm
  vocab_size: 129280
  head_dim: 56
  num_attention_heads: 128
  num_key_value_heads: 128
  intermediate_size: 18432
  num_experts_per_tok: 8
modules:
  ffn_moe:
    mlp.experts.N.up_proj.weight_scale_inv: {shape: [256, 16, 56], dtype: F32, layers: 61, parallel_strategy: EP, world_size: 1}
    mlp.experts.N.down_proj.weight: {shape: [256, 7168, 2048], dtype: F8_E4M3, layers: 61, parallel_strategy: EP, world_size: 1}
    mlp.experts.N.down_proj.weight_scale_inv: {shape: [256, 56, 16], dtype: F32, layers: 61, parallel_strategy: EP, world_size: 1}
    mlp.experts.N.gate_proj.weight: {shape: [256, 2048, 7168], dtype: F8_E4M3, layers: 61, parallel_strategy: EP, world_size: 1}
    mlp.experts.N.gate_proj.weight_scale_inv: {shape: [256, 16, 56], dtype: F32, layers: 61, parallel_strategy: EP, world_size: 1}
    mlp.experts.N.up_proj.weight: {shape: [256, 2048, 7168], dtype: F8_E4M3, layers: 61, parallel_strategy: EP, world_size: 1}
    mlp.gate.weight: {shape: [256, 7168], dtype: BF16, layers: 59, parallel_strategy: EP, world_size: 1}
    mlp.gate.e_score_correction_bias: {shape: [256], dtype: F32, layers: 59, parallel_strategy: replicated}
  norm:
    input_layernorm.weight: {shape: [7168], dtype: BF16, layers: 62, parallel_strategy: replicated}
    post_attention_layernorm.weight: {shape: [7168], dtype: BF16, layers: 62, parallel_strategy: replicated}
    model.norm.weight: {shape: [7168], dtype: BF16, layers: 1, parallel_strategy: replicated}
  attention:
    self_attn.q_a_proj.weight: {shape: [1536, 7168], dtype: F8_E4M3, layers: 62, parallel_strategy: TP, world_size: 1}
    self_attn.q_a_proj.weight_scale_inv: {shape: [12, 56], dtype: F32, layers: 62, parallel_strategy: replicated}
    self_attn.q_a_layernorm.weight: {shape: [1536], dtype: BF16, layers: 62, parallel_strategy: TP, world_size: 1}
    self_attn.q_b_proj.weight: {shape: [24576, 1536], dtype: F8_E4M3, layers: 62, parallel_strategy: TP, world_size: 1}
    self_attn.q_b_proj.weight_scale_inv: {shape: [192, 12], dtype: F32, layers: 62, parallel_strategy: replicated}
    self_attn.kv_a_proj_with_mqa.weight: {shape: [576, 7168], dtype: F8_E4M3, layers: 62, parallel_strategy: TP, world_size: 1}
    self_attn.kv_a_proj_with_mqa.weight_scale_inv: {shape: [5, 56], dtype: F32, layers: 62, parallel_strategy: replicated}
    self_attn.kv_a_layernorm.weight: {shape: [512], dtype: BF16, layers: 62, parallel_strategy: TP, world_size: 1}
    self_attn.kv_b_proj.weight: {shape: [32768, 512], dtype: F8_E4M3, layers: 62, parallel_strategy: TP, world_size: 1}
    self_attn.kv_b_proj.weight_scale_inv: {shape: [256, 4], dtype: F32, layers: 62, parallel_strategy: replicated}
    self_attn.o_proj.weight: {shape: [7168, 16384], dtype: F8_E4M3, layers: 62, parallel_strategy: TP, world_size: 1}
    self_attn.o_proj.weight_scale_inv: {shape: [56, 128], dtype: F32, layers: 62, parallel_strategy: replicated}
  ffn_shared_expert:
    mlp.shared_experts.gate_proj.weight: {shape: [2048, 7168], dtype: F8_E4M3, layers: 59, parallel_strategy: replicated}
    mlp.shared_experts.gate_proj.weight_scale_inv: {shape: [16, 56], dtype: F32, layers: 59, parallel_strategy: replicated}
    mlp.shared_experts.up_proj.weight: {shape: [2048, 7168], dtype: F8_E4M3, layers: 59, parallel_strategy: replicated}
    mlp.shared_experts.up_proj.weight_scale_inv: {shape: [16, 56], dtype: F32, layers: 59, parallel_strategy: replicated}
    mlp.shared_experts.down_proj.weight: {shape: [7168, 2048], dtype: F8_E4M3, layers: 59, parallel_strategy: replicated}
    mlp.shared_experts.down_proj.weight_scale_inv: {shape: [56, 16], dtype: F32, layers: 59, parallel_strategy: replicated}
  embedding:
    model.embed_tokens.weight: {shape: [129280, 7168], dtype: BF16, layers: 1, parallel_strategy: TP, world_size: 1}
    lm_head.weight: {shape: [129280, 7168], dtype: BF16, layers: 1, parallel_strategy: TP, world_size: 1}
  ffn_dense:
    mlp.gate_proj.weight: {shape: [18432, 7168], dtype: F8_E4M3, layers: 3, parallel_strategy: TP, world_size: 1}
    mlp.gate_proj.weight_scale_inv: {shape: [144, 56], dtype: F32, layers: 3, parallel_strategy: TP, world_size: 1}
    mlp.up_proj.weight: {shape: [18432, 7168], dtype: F8_E4M3, layers: 3, parallel_strategy: TP, world_size: 1}
    mlp.up_proj.weight_scale_inv: {shape: [144, 56], dtype: F32, layers: 3, parallel_strategy: TP, world_size: 1}
    mlp.down_proj.weight: {shape: [7168, 18432], dtype: F8_E4M3, layers: 3, parallel_strategy: TP, world_size: 1}
    mlp.down_proj.weight_scale_inv: {shape: [56, 144], dtype: F32, layers: 3, parallel_strategy: TP, world_size: 1}
  others:
    model.layers.61.embed_tokens.weight: {shape: [129280, 7168], dtype: BF16, layers: 1, parallel_strategy: replicated}
    model.layers.61.enorm.weight: {shape: [7168], dtype: BF16, layers: 1, parallel_strategy: replicated}
    model.layers.61.hnorm.weight: {shape: [7168], dtype: BF16, layers: 1, parallel_strategy: replicated}
    model.layers.61.eh_proj.weight: {shape: [7168, 14336], dtype: BF16, layers: 1, parallel_strategy: replicated}
    model.layers.61.shared_head.norm.weight: {shape: [7168], dtype: BF16, layers: 1, parallel_strategy: replicated}
    model.layers.61.shared_head.head.weight: {shape: [129280, 7168], dtype: BF16, layers: 1, parallel_strategy: replicated}
computation_rules:
  recommended_capacity_factor: 1.25
  kv_cache: 2 * batch_size * (prompt_len + gen_len) * (512 + 64) * num_layers
  activation: batch_size * gen_len * hidden_size * 8 * 1.25