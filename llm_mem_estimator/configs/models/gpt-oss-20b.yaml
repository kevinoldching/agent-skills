model_identity:
  name: gpt-oss-20b
  total_params: '11.96B'
  num_layers: 24
  quantization: mxfp4
architecture_config:
  hidden_size: 2880
  num_layers: 24
  attention_type: swa
  ffn_type: moe
  norm_type: rmsnorm
  vocab_size: 201088
  head_dim: 64
  num_attention_heads: 64
  num_key_value_heads: 8
  intermediate_size: 2880
  num_experts_per_tok: 4
  window_size: 128
modules:
  ffn_moe:
    mlp.experts.down_proj_bias: {shape: [32, 2880], dtype: BF16, layers: 24, parallel_strategy: EP}
    mlp.experts.gate_up_proj_bias: {shape: [32, 5760], dtype: BF16, layers: 24, parallel_strategy: EP}
    mlp.router.bias: {shape: [32], dtype: BF16, layers: 24, parallel_strategy: replicated}
    mlp.router.weight: {shape: [32, 2880], dtype: BF16, layers: 24, parallel_strategy: replicated}
    mlp.experts.down_proj_blocks: {shape: [32, 2880, 90, 16], dtype: U8, layers: 24, parallel_strategy: EP}
    mlp.experts.down_proj_scales: {shape: [32, 2880, 90], dtype: U8, layers: 24, parallel_strategy: EP}
    mlp.experts.gate_up_proj_blocks: {shape: [32, 5760, 90, 16], dtype: U8, layers: 24, parallel_strategy: EP}
    mlp.experts.gate_up_proj_scales: {shape: [32, 5760, 90], dtype: U8, layers: 24, parallel_strategy: EP}
  norm:
    post_attention_layernorm.weight: {shape: [2880], dtype: BF16, layers: 24, parallel_strategy: replicated}
    input_layernorm.weight: {shape: [2880], dtype: BF16, layers: 24, parallel_strategy: replicated}
    model.norm.weight: {shape: [2880], dtype: BF16, layers: 1, parallel_strategy: replicated}
  attention:
    self_attn.k_proj.weight: {shape: [512, 2880], dtype: BF16, layers: 24, parallel_strategy: TP}
    self_attn.q_proj.weight: {shape: [4096, 2880], dtype: BF16, layers: 24, parallel_strategy: TP}
    self_attn.sinks: {shape: [64], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.v_proj.weight: {shape: [512, 2880], dtype: BF16, layers: 24, parallel_strategy: TP}
    self_attn.k_proj.bias: {shape: [512], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.o_proj.bias: {shape: [2880], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.o_proj.weight: {shape: [2880, 4096], dtype: BF16, layers: 24, parallel_strategy: TP}
    self_attn.q_proj.bias: {shape: [4096], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.v_proj.bias: {shape: [512], dtype: BF16, layers: 24, parallel_strategy: replicated}
  embedding:
    lm_head.weight: {shape: [201088, 2880], dtype: BF16, layers: 1, parallel_strategy: TP}
    model.embed_tokens.weight: {shape: [201088, 2880], dtype: BF16, layers: 1, parallel_strategy: TP}
computation_rules:
  recommended_capacity_factor:
    has_prefill: 1.25
    decode: 12.5
  kv_cache: (12 * batch_size * seq_len * 1024 + 12 * min(batch_size * seq_len, 128) * 1024) / (tp_size * cp_size)
  activation: batch_size * seq_len * hidden_size * num_experts_per_tok * recommended_capacity_factor / cp_size
  system_reserved_gb: 2.0
  gpu_util: 0.9