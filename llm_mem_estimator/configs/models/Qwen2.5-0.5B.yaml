model_identity:
  name: Qwen2.5-0.5B
  total_params: '0.49B'
  num_layers: 24
architecture_config:
  hidden_size: 896
  num_layers: 24
  attention_type: swa
  ffn_type: standard
  norm_type: rmsnorm
  vocab_size: 151936
  head_dim: 64
  num_attention_heads: 14
  num_key_value_heads: 2
  intermediate_size: 4864
  window_size: 32768
modules:
  embedding:
    model.embed_tokens.weight: {shape: [151936, 896], dtype: BF16, layers: 1, parallel_strategy: TP}
  norm:
    input_layernorm.weight: {shape: [896], dtype: BF16, layers: 24, parallel_strategy: replicated}
    post_attention_layernorm.weight: {shape: [896], dtype: BF16, layers: 24, parallel_strategy: replicated}
    model.norm.weight: {shape: [896], dtype: BF16, layers: 1, parallel_strategy: replicated}
  ffn_dense:
    mlp.down_proj.weight: {shape: [896, 4864], dtype: BF16, layers: 24, parallel_strategy: TP}
    mlp.gate_proj.weight: {shape: [4864, 896], dtype: BF16, layers: 24, parallel_strategy: TP}
    mlp.up_proj.weight: {shape: [4864, 896], dtype: BF16, layers: 24, parallel_strategy: TP}
  attention:
    self_attn.k_proj.bias: {shape: [128], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.k_proj.weight: {shape: [128, 896], dtype: BF16, layers: 24, parallel_strategy: TP}
    self_attn.o_proj.weight: {shape: [896, 896], dtype: BF16, layers: 24, parallel_strategy: TP}
    self_attn.q_proj.bias: {shape: [896], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.q_proj.weight: {shape: [896, 896], dtype: BF16, layers: 24, parallel_strategy: TP}
    self_attn.v_proj.bias: {shape: [128], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.v_proj.weight: {shape: [128, 896], dtype: BF16, layers: 24, parallel_strategy: TP}
computation_rules:
  recommended_capacity_factor:
    has_prefill: 1.25
    decode: 12.5
  kv_cache: 2 * batch_size * min(seq_len, window_size) * num_key_value_heads * head_dim * num_layers / (tp_size * cp_size)
  activation: 
  system_reserved_gb: 2.0
  gpu_util: 0.9