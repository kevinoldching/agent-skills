model_identity:
  name: Qwen3-Coder-Next
  total_params: '79.67B'
  num_layers: 48
architecture_config:
  hidden_size: 2048
  num_layers: 48
  attention_type: gqa
  ffn_type: moe
  norm_type: rmsnorm
  vocab_size: 151936
  head_dim: 256
  num_attention_heads: 16
  num_key_value_heads: 2
  intermediate_size: 5120
  num_experts: 512
  num_experts_per_tok: 10
  moe_intermediate_size: 512
modules:
  ffn_moe:
    mlp.experts.N.down_proj.weight: {shape: [512, 2048, 512], dtype: BF16, layers: 48, parallel_strategy: EP}
    mlp.experts.N.up_proj.weight: {shape: [512, 512, 2048], dtype: BF16, layers: 48, parallel_strategy: EP}
    mlp.experts.N.gate_proj.weight: {shape: [512, 512, 2048], dtype: BF16, layers: 48, parallel_strategy: EP}
    mlp.gate.weight: {shape: [512, 2048], dtype: BF16, layers: 48, parallel_strategy: replicated}
  norm:
    input_layernorm.weight: {shape: [2048], dtype: BF16, layers: 48, parallel_strategy: replicated}
    post_attention_layernorm.weight: {shape: [2048], dtype: BF16, layers: 48, parallel_strategy: replicated}
    model.norm.weight: {shape: [2048], dtype: BF16, layers: 1, parallel_strategy: replicated}
  ffn_shared_expert:
    mlp.shared_expert.down_proj.weight: {shape: [2048, 512], dtype: BF16, layers: 48, parallel_strategy: replicated}
    mlp.shared_expert.gate_proj.weight: {shape: [512, 2048], dtype: BF16, layers: 48, parallel_strategy: replicated}
    mlp.shared_expert.up_proj.weight: {shape: [512, 2048], dtype: BF16, layers: 48, parallel_strategy: replicated}
  others:
    mlp.shared_expert_gate.weight: {shape: [1, 2048], dtype: BF16, layers: 48, parallel_strategy: replicated}
  attention:
    self_attn.k_norm.weight: {shape: [256], dtype: BF16, layers: 48, parallel_strategy: replicated}
    self_attn.k_proj.weight: {shape: [512, 2048], dtype: BF16, layers: 48, parallel_strategy: TP}
    self_attn.o_proj.weight: {shape: [2048, 4096], dtype: BF16, layers: 48, parallel_strategy: TP}
    self_attn.q_norm.weight: {shape: [256], dtype: BF16, layers: 48, parallel_strategy: replicated}
    self_attn.q_proj.weight: {shape: [8192, 2048], dtype: BF16, layers: 48, parallel_strategy: TP}
    self_attn.v_proj.weight: {shape: [512, 2048], dtype: BF16, layers: 48, parallel_strategy: TP}
    linear_attn.A_log: {shape: [32], dtype: BF16, layers: 48, parallel_strategy: replicated}
    linear_attn.conv1d.weight: {shape: [8192, 1, 4], dtype: BF16, layers: 48, parallel_strategy: replicated}
    linear_attn.dt_bias: {shape: [32], dtype: BF16, layers: 48, parallel_strategy: replicated}
    linear_attn.in_proj_ba.weight: {shape: [64, 2048], dtype: BF16, layers: 48, parallel_strategy: replicated}
    linear_attn.in_proj_qkvz.weight: {shape: [12288, 2048], dtype: BF16, layers: 48, parallel_strategy: replicated}
    linear_attn.norm.weight: {shape: [128], dtype: BF16, layers: 48, parallel_strategy: replicated}
    linear_attn.out_proj.weight: {shape: [2048, 4096], dtype: BF16, layers: 48, parallel_strategy: replicated}
  embedding:
    lm_head.weight: {shape: [151936, 2048], dtype: BF16, layers: 1, parallel_strategy: TP}
    model.embed_tokens.weight: {shape: [151936, 2048], dtype: BF16, layers: 1, parallel_strategy: TP}
computation_rules:
  recommended_capacity_factor:
    has_prefill: 1.25
    decode: 12.5
  kv_cache: 2 * batch_size * seq_len * num_key_value_heads * head_dim * num_layers / (tp_size * cp_size)
  activation: batch_size * seq_len * hidden_size * num_experts_per_tok * recommended_capacity_factor / cp_size
  system_reserved_gb: 2.0
  gpu_util: 0.9