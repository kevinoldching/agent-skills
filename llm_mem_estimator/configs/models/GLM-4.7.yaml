model_identity:
  name: GLM-4.7
  total_params: '358.34B'
  num_layers: 92
architecture_config:
  hidden_size: 5120
  num_layers: 92
  attention_type: gqa
  ffn_type: moe
  norm_type: rmsnorm
  vocab_size: 151552
  head_dim: 128
  num_attention_heads: 96
  num_key_value_heads: 8
  intermediate_size: 12288
  num_experts: 160
  num_experts_per_tok: 8
  moe_intermediate_size: 1536
modules:
  ffn_moe:
    mlp.gate.e_score_correction_bias: {shape: [160], dtype: F32, layers: 90, parallel_strategy: replicated}
    mlp.experts.N.down_proj.weight: {shape: [160, 5120, 1536], dtype: BF16, layers: 90, parallel_strategy: EP}
    mlp.experts.N.gate_proj.weight: {shape: [160, 1536, 5120], dtype: BF16, layers: 90, parallel_strategy: EP}
    mlp.experts.N.up_proj.weight: {shape: [160, 1536, 5120], dtype: BF16, layers: 90, parallel_strategy: EP}
    mlp.gate.weight: {shape: [160, 5120], dtype: BF16, layers: 90, parallel_strategy: replicated}
  norm:
    input_layernorm.weight: {shape: [5120], dtype: BF16, layers: 93, parallel_strategy: replicated}
    post_attention_layernorm.weight: {shape: [5120], dtype: BF16, layers: 93, parallel_strategy: replicated}
    model.norm.weight: {shape: [5120], dtype: BF16, layers: 1, parallel_strategy: replicated}
  ffn_shared_expert:
    mlp.shared_experts.down_proj.weight: {shape: [5120, 1536], dtype: BF16, layers: 90, parallel_strategy: replicated}
    mlp.shared_experts.gate_proj.weight: {shape: [1536, 5120], dtype: BF16, layers: 90, parallel_strategy: replicated}
    mlp.shared_experts.up_proj.weight: {shape: [1536, 5120], dtype: BF16, layers: 90, parallel_strategy: replicated}
  attention:
    self_attn.k_norm.weight: {shape: [128], dtype: BF16, layers: 93, parallel_strategy: replicated}
    self_attn.k_proj.bias: {shape: [1024], dtype: BF16, layers: 93, parallel_strategy: replicated}
    self_attn.k_proj.weight: {shape: [1024, 5120], dtype: BF16, layers: 93, parallel_strategy: TP}
    self_attn.o_proj.weight: {shape: [5120, 12288], dtype: BF16, layers: 93, parallel_strategy: TP}
    self_attn.q_norm.weight: {shape: [128], dtype: BF16, layers: 93, parallel_strategy: replicated}
    self_attn.q_proj.bias: {shape: [12288], dtype: BF16, layers: 93, parallel_strategy: replicated}
    self_attn.q_proj.weight: {shape: [12288, 5120], dtype: BF16, layers: 93, parallel_strategy: TP}
    self_attn.v_proj.bias: {shape: [1024], dtype: BF16, layers: 93, parallel_strategy: replicated}
    self_attn.v_proj.weight: {shape: [1024, 5120], dtype: BF16, layers: 93, parallel_strategy: TP}
  ffn_dense:
    mlp.down_proj.weight: {shape: [5120, 12288], dtype: BF16, layers: 3, parallel_strategy: TP}
    mlp.gate_proj.weight: {shape: [12288, 5120], dtype: BF16, layers: 3, parallel_strategy: TP}
    mlp.up_proj.weight: {shape: [12288, 5120], dtype: BF16, layers: 3, parallel_strategy: TP}
  others:
    model.layers.92.eh_proj.weight: {shape: [5120, 10240], dtype: BF16, layers: 1, parallel_strategy: replicated}
    model.layers.92.embed_tokens.weight: {shape: [151552, 5120], dtype: BF16, layers: 1, parallel_strategy: replicated}
    model.layers.92.enorm.weight: {shape: [5120], dtype: BF16, layers: 1, parallel_strategy: replicated}
    model.layers.92.hnorm.weight: {shape: [5120], dtype: BF16, layers: 1, parallel_strategy: replicated}
    model.layers.92.shared_head.head.weight: {shape: [151552, 5120], dtype: BF16, layers: 1, parallel_strategy: replicated}
    model.layers.92.shared_head.norm.weight: {shape: [5120], dtype: BF16, layers: 1, parallel_strategy: replicated}
  embedding:
    model.embed_tokens.weight: {shape: [151552, 5120], dtype: BF16, layers: 1, parallel_strategy: TP}
    lm_head.weight: {shape: [151552, 5120], dtype: BF16, layers: 1, parallel_strategy: TP}
computation_rules:
  recommended_capacity_factor:
    has_prefill: 1.25
    decode: 12.5
  kv_cache: 2 * batch_size * seq_len * num_key_value_heads * head_dim * num_layers / (tp_size * cp_size)
  activation: batch_size * seq_len * hidden_size * num_experts_per_tok * recommended_capacity_factor / cp_size
  system_reserved_gb: 2.0
  gpu_util: 0.9