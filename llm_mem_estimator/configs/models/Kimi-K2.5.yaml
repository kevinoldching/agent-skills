model_identity:
  name: Kimi-K2.5
  total_params: '170.74B'
  num_layers: 61
  quantization: compressed-tensors
architecture_config:
  hidden_size: 7168
  num_layers: 61
  attention_type: mla
  ffn_type: moe
  norm_type: rmsnorm
  vocab_size: 163840
  head_dim: 112
  num_attention_heads: 64
  num_key_value_heads: 64
  intermediate_size: 18432
  num_experts_per_tok: 8
  moe_intermediate_size: 2048
  q_lora_rank: 1536
  kv_lora_rank: 512
  qk_rope_head_dim: 64
  qk_nope_head_dim: 128
  v_head_dim: 128
modules:
  norm:
    language_model.model.norm.weight: {shape: [7168], dtype: BF16, layers: 61, parallel_strategy: replicated}
    language_model.layers.0.input_layernorm.weight: {shape: [7168], dtype: BF16, layers: 61, parallel_strategy: replicated}
    language_model.layers.0.post_attention_layernorm.weight: {shape: [7168], dtype: BF16, layers: 61, parallel_strategy: replicated}
  ffn_moe:
    language_model.mlp.gate.weight: {shape: [384, 7168], dtype: BF16, layers: 60, parallel_strategy: replicated}
  attention:
    language_model.layers.0.self_attn.q_a_proj.weight: {shape: [1536, 7168], dtype: BF16, layers: 61, parallel_strategy: replicated}
    language_model.layers.0.self_attn.q_a_layernorm.weight: {shape: [1536], dtype: BF16, layers: 61, parallel_strategy: replicated}
    language_model.layers.0.self_attn.q_b_proj.weight: {shape: [12288, 1536], dtype: BF16, layers: 61, parallel_strategy: TP}
    language_model.layers.0.self_attn.kv_a_proj_with_mqa.weight: {shape: [576, 7168], dtype: BF16, layers: 61, parallel_strategy: replicated}
    language_model.layers.0.self_attn.kv_a_layernorm.weight: {shape: [512], dtype: BF16, layers: 61, parallel_strategy: replicated}
    language_model.layers.0.self_attn.kv_b_proj.weight: {shape: [16384, 512], dtype: BF16, layers: 61, parallel_strategy: TP}
    language_model.layers.0.self_attn.o_proj.weight: {shape: [7168, 8192], dtype: BF16, layers: 61, parallel_strategy: TP}
  embedding:
    language_model.lm_head.weight: {shape: [163840, 7168], dtype: BF16, layers: 1, parallel_strategy: replicated}
    language_model.model.embed_tokens.weight: {shape: [163840, 7168], dtype: BF16, layers: 1, parallel_strategy: replicated}
computation_rules:
  recommended_capacity_factor:
    has_prefill: 1.25
    decode: 12.5
  system_reserved_gb: 2.0
  gpu_util: 0.9
  kv_cache: 2 * batch_size * seq_len * kv_lora_rank * num_layers / (tp_size * cp_size)
  activation: batch_size * seq_len * hidden_size * num_experts_per_tok * recommended_capacity_factor / cp_size
