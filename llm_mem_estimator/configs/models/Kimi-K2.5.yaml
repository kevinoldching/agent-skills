model_identity:
  name: kimi-k2.5
  total_params: unknown
  num_layers: 61
  quantization: compressed-tensors
architecture_config:
  hidden_size: 7168
  num_layers: 61
  attention_type: mla
  ffn_type: moe
  norm_type: rmsnorm
  vocab_size: 163840
  head_dim: 112
  num_attention_heads: 64
  num_key_value_heads: 64
  intermediate_size: 18432
  num_experts_per_tok: 8
  window_size: null
modules:
  norm:
    language_model.model.norm.weight: {shape: [7168], dtype: BF16, layers: 61, parallel_strategy: replicated}
  ffn_moe:
    language_model.layers.mlp.router.weight: {shape: [64, 7168], dtype: BF16, layers: 61, parallel_strategy: replicated}
    language_model.layers.mlp.experts.gate_up_proj.weight: {shape: [2048, 7168], dtype: BF16, layers: 61, parallel_strategy: EP}
    language_model.layers.mlp.experts.down_proj.weight: {shape: [7168, 2048], dtype: BF16, layers: 61, parallel_strategy: EP}
  attention:
    language_model.layers.self_attn.q_proj.weight: {shape: [7168, 7168], dtype: BF16, layers: 61, parallel_strategy: TP}
    language_model.layers.self_attn.k_proj.weight: {shape: [512, 7168], dtype: BF16, layers: 61, parallel_strategy: TP}
    language_model.layers.self_attn.v_proj.weight: {shape: [512, 7168], dtype: BF16, layers: 61, parallel_strategy: TP}
    language_model.layers.self_attn.o_proj.weight: {shape: [7168, 7168], dtype: BF16, layers: 61, parallel_strategy: TP}
  embedding:
    language_model.lm_head.weight: {shape: [163840, 7168], dtype: BF16, layers: 1, parallel_strategy: replicated}
    language_model.model.embed_tokens.weight: {shape: [163840, 7168], dtype: BF16, layers: 1, parallel_strategy: replicated}
computation_rules:
  recommended_capacity_factor:
    has_prefill: 1.25
    decode: 100000
  system_reserved_gb: 2.0
  gpu_util: 0.9
  kv_cache: (2 * batch_size * seq_len * num_key_value_heads * head_dim * num_layers) / (tp_size * cp_size)
  activation: batch_size * seq_len * hidden_size * num_experts_per_tok * recommended_capacity_factor / cp_size
