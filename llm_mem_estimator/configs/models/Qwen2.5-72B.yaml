model_identity:
  name: Qwen2.5-72B
  total_params: '72.71B'
  num_layers: 80
architecture_config:
  hidden_size: 8192
  num_layers: 80
  attention_type: swa
  ffn_type: dense
  norm_type: rmsnorm
  vocab_size: 152064
  head_dim: 128
  num_attention_heads: 64
  num_key_value_heads: 8
  intermediate_size: 29568
  window_size: 131072
modules:
  norm:
    input_layernorm.weight: {shape: [8192], dtype: BF16, layers: 80, parallel_strategy: replicated}
    post_attention_layernorm.weight: {shape: [8192], dtype: BF16, layers: 80, parallel_strategy: replicated}
    model.norm.weight: {shape: [8192], dtype: BF16, layers: 1, parallel_strategy: replicated}
  ffn_dense:
    mlp.down_proj.weight: {shape: [8192, 29568], dtype: BF16, layers: 80, parallel_strategy: TP}
    mlp.gate_proj.weight: {shape: [29568, 8192], dtype: BF16, layers: 80, parallel_strategy: TP}
    mlp.up_proj.weight: {shape: [29568, 8192], dtype: BF16, layers: 80, parallel_strategy: TP}
  attention:
    self_attn.k_proj.bias: {shape: [1024], dtype: BF16, layers: 80, parallel_strategy: replicated}
    self_attn.k_proj.weight: {shape: [1024, 8192], dtype: BF16, layers: 80, parallel_strategy: TP}
    self_attn.o_proj.weight: {shape: [8192, 8192], dtype: BF16, layers: 80, parallel_strategy: TP}
    self_attn.q_proj.bias: {shape: [8192], dtype: BF16, layers: 80, parallel_strategy: replicated}
    self_attn.q_proj.weight: {shape: [8192, 8192], dtype: BF16, layers: 80, parallel_strategy: TP}
    self_attn.v_proj.bias: {shape: [1024], dtype: BF16, layers: 80, parallel_strategy: replicated}
    self_attn.v_proj.weight: {shape: [1024, 8192], dtype: BF16, layers: 80, parallel_strategy: TP}
  embedding:
    lm_head.weight: {shape: [152064, 8192], dtype: BF16, layers: 1, parallel_strategy: TP}
    model.embed_tokens.weight: {shape: [152064, 8192], dtype: BF16, layers: 1, parallel_strategy: TP}
computation_rules:
  recommended_capacity_factor:
    has_prefill: 1.25
    decode: 12.5
  kv_cache: 2 * batch_size * min(seq_len, window_size) * num_key_value_heads * head_dim * num_layers / (tp_size * cp_size)
  activation: batch_size * seq_len * hidden_size * recommended_capacity_factor / cp_size
  system_reserved_gb: 2.0
  gpu_util: 0.9