model_identity:
  name: MiniMax-M2
  total_params: '228.70B'
  num_layers: 62
  quantization: fp8
architecture_config:
  hidden_size: 3072
  num_layers: 62
  attention_type: gqa
  ffn_type: moe
  norm_type: rmsnorm
  vocab_size: 200064
  head_dim: 128
  num_attention_heads: 48
  num_key_value_heads: 8
  intermediate_size: 1536
  num_experts_per_tok: 8
modules:
  embedding:
    model.embed_tokens.weight: {shape: [200064, 3072], dtype: BF16, layers: 1, parallel_strategy: replicated}
    lm_head.weight: {shape: [200064, 3072], dtype: BF16, layers: 1, parallel_strategy: replicated}
  norm:
    input_layernorm.weight: {shape: [3072], dtype: BF16, layers: 62, parallel_strategy: replicated}
    post_attention_layernorm.weight: {shape: [3072], dtype: BF16, layers: 62, parallel_strategy: replicated}
    model.norm.weight: {shape: [3072], dtype: BF16, layers: 1, parallel_strategy: replicated}
  attention:
    self_attn.q_proj.weight: {shape: [6144, 3072], dtype: F8_E4M3, layers: 62, parallel_strategy: replicated}
    self_attn.q_proj.weight_scale_inv: {shape: [48, 24], dtype: F32, layers: 62, parallel_strategy: replicated}
    self_attn.k_proj.weight: {shape: [1024, 3072], dtype: F8_E4M3, layers: 62, parallel_strategy: replicated}
    self_attn.k_proj.weight_scale_inv: {shape: [8, 24], dtype: F32, layers: 62, parallel_strategy: replicated}
    self_attn.v_proj.weight: {shape: [1024, 3072], dtype: F8_E4M3, layers: 62, parallel_strategy: replicated}
    self_attn.v_proj.weight_scale_inv: {shape: [8, 24], dtype: F32, layers: 62, parallel_strategy: replicated}
    self_attn.q_norm.weight: {shape: [6144], dtype: BF16, layers: 62, parallel_strategy: replicated}
    self_attn.k_norm.weight: {shape: [1024], dtype: BF16, layers: 62, parallel_strategy: replicated}
    self_attn.o_proj.weight: {shape: [3072, 6144], dtype: F8_E4M3, layers: 62, parallel_strategy: replicated}
    self_attn.o_proj.weight_scale_inv: {shape: [24, 48], dtype: F32, layers: 62, parallel_strategy: replicated}
  ffn_moe:
    block_sparse_moe.gate.weight: {shape: [256, 3072], dtype: F32, layers: 62, parallel_strategy: replicated}
    block_sparse_moe.experts.N.w1.weight: {shape: [256, 1536, 3072], dtype: F8_E4M3, layers: 62, parallel_strategy: replicated}
    block_sparse_moe.experts.N.w1.weight_scale_inv: {shape: [256, 12, 24], dtype: F32, layers: 62, parallel_strategy: replicated}
    block_sparse_moe.experts.N.w3.weight: {shape: [256, 1536, 3072], dtype: F8_E4M3, layers: 62, parallel_strategy: replicated}
    block_sparse_moe.experts.N.w3.weight_scale_inv: {shape: [256, 12, 24], dtype: F32, layers: 62, parallel_strategy: replicated}
    block_sparse_moe.experts.N.w2.weight: {shape: [256, 3072, 1536], dtype: F8_E4M3, layers: 62, parallel_strategy: replicated}
    block_sparse_moe.experts.N.w2.weight_scale_inv: {shape: [256, 24, 12], dtype: F32, layers: 62, parallel_strategy: replicated}
  others:
    block_sparse_moe.e_score_correction_bias: {shape: [256], dtype: F32, layers: 62, parallel_strategy: replicated}
computation_rules:
  recommended_capacity_factor: 1.25
  kv_cache: 2 * batch_size * seq_len * 1024 * num_layers
  activation: batch_size * seq_len * hidden_size * 8 * 1.25