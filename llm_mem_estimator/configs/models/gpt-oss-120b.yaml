architecture_config:
  attention_type: gqa
  ffn_type: standard
  hidden_size: 2880
  intermediate_size: 2880
  norm_type: rmsnorm
  num_attention_heads: 64
  num_experts_per_tok: 4
  num_key_value_heads: 8
  num_layers: 36
  vocab_size: 201088
computation_rules:
  activation: 4 * batch_size * seq_len * hidden_size * num_layers
  kv_cache: 2 * batch_size * seq_len * 360 * num_layers
model_identity:
  name: gpt-oss-120b
  num_layers: 36
  quantization: mxfp4
  total_params: unknown
modules:
