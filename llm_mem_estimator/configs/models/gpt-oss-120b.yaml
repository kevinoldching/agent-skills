model_identity:
  name: gpt-oss-120b
  total_params: '63.08B'
  num_layers: 36
  quantization: mxfp4
architecture_config:
  hidden_size: 2880
  num_layers: 36
  attention_type: gqa
  ffn_type: moe
  norm_type: rmsnorm
  vocab_size: 201088
  head_dim: 64
  num_attention_heads: 64
  num_key_value_heads: 8
  intermediate_size: 2880
  num_experts_per_tok: 4
modules:
  ffn_moe:
    mlp.experts.down_proj_bias: {shape: [128, 2880], dtype: BF16, layers: 36, parallel_strategy: EP, world_size: 1}
    mlp.experts.gate_up_proj_bias: {shape: [128, 5760], dtype: BF16, layers: 36, parallel_strategy: EP, world_size: 1}
    mlp.router.bias: {shape: [128], dtype: BF16, layers: 36, parallel_strategy: replicated}
    mlp.router.weight: {shape: [128, 2880], dtype: BF16, layers: 36, parallel_strategy: replicated}
    mlp.experts.down_proj_blocks: {shape: [128, 2880, 90, 16], dtype: U8, layers: 36, parallel_strategy: EP, world_size: 1}
    mlp.experts.down_proj_scales: {shape: [128, 2880, 90], dtype: U8, layers: 36, parallel_strategy: EP, world_size: 1}
    mlp.experts.gate_up_proj_blocks: {shape: [128, 5760, 90, 16], dtype: U8, layers: 36, parallel_strategy: EP, world_size: 1}
    mlp.experts.gate_up_proj_scales: {shape: [128, 5760, 90], dtype: U8, layers: 36, parallel_strategy: EP, world_size: 1}
  norm:
    post_attention_layernorm.weight: {shape: [2880], dtype: BF16, layers: 36, parallel_strategy: replicated}
    input_layernorm.weight: {shape: [2880], dtype: BF16, layers: 36, parallel_strategy: replicated}
    model.norm.weight: {shape: [2880], dtype: BF16, layers: 1, parallel_strategy: replicated}
  attention:
    self_attn.k_proj.bias: {shape: [512], dtype: BF16, layers: 36, parallel_strategy: replicated}
    self_attn.k_proj.weight: {shape: [512, 2880], dtype: BF16, layers: 36, parallel_strategy: TP, world_size: 1}
    self_attn.o_proj.bias: {shape: [2880], dtype: BF16, layers: 36, parallel_strategy: replicated}
    self_attn.o_proj.weight: {shape: [2880, 4096], dtype: BF16, layers: 36, parallel_strategy: TP, world_size: 1}
    self_attn.q_proj.bias: {shape: [4096], dtype: BF16, layers: 36, parallel_strategy: replicated}
    self_attn.q_proj.weight: {shape: [4096, 2880], dtype: BF16, layers: 36, parallel_strategy: TP, world_size: 1}
    self_attn.sinks: {shape: [64], dtype: BF16, layers: 36, parallel_strategy: replicated}
    self_attn.v_proj.bias: {shape: [512], dtype: BF16, layers: 36, parallel_strategy: replicated}
    self_attn.v_proj.weight: {shape: [512, 2880], dtype: BF16, layers: 36, parallel_strategy: TP, world_size: 1}
  embedding:
    lm_head.weight: {shape: [201088, 2880], dtype: BF16, layers: 1, parallel_strategy: TP, world_size: 1}
    model.embed_tokens.weight: {shape: [201088, 2880], dtype: BF16, layers: 1, parallel_strategy: TP, world_size: 1}
computation_rules:
  recommended_capacity_factor: 1.25
  kv_cache: 2 * batch_size * seq_len * 512 * num_layers
  activation: batch_size * seq_len * hidden_size * 4 * 1.25 * dtype_bytes