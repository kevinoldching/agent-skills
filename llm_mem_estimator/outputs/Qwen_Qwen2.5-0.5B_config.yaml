model_identity:
  name: Qwen2.5-0.5B
  total_params: '0.49B'
  num_layers: 24
architecture_config:
  hidden_size: 896
  num_layers: 24
  attention_type: gqa
  ffn_type: standard
  norm_type: rmsnorm
  vocab_size: 151936
  num_attention_heads: 14
  num_key_value_heads: 2
  intermediate_size: 4864
modules:
  embedding:
    model.embed_tokens.weight: {shape: [151936, 896], dtype: BF16, layers: 1, parallel_strategy: replicated}
  norm:
    input_layernorm.weight: {shape: [896], dtype: BF16, layers: 24, parallel_strategy: replicated}
    post_attention_layernorm.weight: {shape: [896], dtype: BF16, layers: 24, parallel_strategy: replicated}
    model.norm.weight: {shape: [896], dtype: BF16, layers: 1, parallel_strategy: replicated}
  ffn_dense:
    mlp.down_proj.weight: {shape: [896, 4864], dtype: BF16, layers: 24, parallel_strategy: replicated}
    mlp.gate_proj.weight: {shape: [4864, 896], dtype: BF16, layers: 24, parallel_strategy: replicated}
    mlp.up_proj.weight: {shape: [4864, 896], dtype: BF16, layers: 24, parallel_strategy: replicated}
  attention:
    self_attn.k_proj.bias: {shape: [128], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.k_proj.weight: {shape: [128, 896], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.o_proj.weight: {shape: [896, 896], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.q_proj.bias: {shape: [896], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.q_proj.weight: {shape: [896, 896], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.v_proj.bias: {shape: [128], dtype: BF16, layers: 24, parallel_strategy: replicated}
    self_attn.v_proj.weight: {shape: [128, 896], dtype: BF16, layers: 24, parallel_strategy: replicated}
computation_rules:
  recommended_capacity_factor: 1.25
  kv_cache: 2 * batch_size * seq_len * 128 * num_layers
  activation: batch_size * seq_len * hidden_size * num_layers * 1.25 * dtype_bytes